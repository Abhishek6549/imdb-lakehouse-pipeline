# IMDb Lakehouse -> OLAP pipeline
#   spark-master / spark-worker : PySpark cluster that cleans raw IMDb TSVs
#                                  and writes partitioned Snappy Parquet to
#                                  the shared ./data/lake volume ("the Lake").
#   clickhouse                  : OLAP engine that the lake is loaded into
#                                  for sub-second analytics.
#   loader                      : throwaway python container with the deps
#                                  needed to run load_to_olap.py / benchmark.py
#                                  against both Spark and ClickHouse.
#
# Uses the official apache/spark image (bitnami/spark's versioned tags now
# require a paid subscription; apache/spark is the upstream-maintained
# replacement). It has no built-in master/worker launcher, so each service
# runs spark-class directly in the foreground.

x-spark-common: &spark-common
  build: ./docker/spark
  image: imdb-spark:4.0.3-python3
  networks: [imdb-net]
  volumes:
    - ./scripts:/opt/scripts
    - ./data:/opt/data

services:
  spark-master:
    <<: *spark-common
    container_name: imdb-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"   # Spark master web UI
      - "7077:7077"   # Spark master RPC

  spark-worker:
    <<: *spark-common
    container_name: imdb-spark-worker
    depends_on: [spark-master]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    ports:
      - "8081:8081"   # Spark worker web UI

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: imdb-clickhouse
    networks: [imdb-net]
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP interface
      - "9001:9000"   # native TCP interface (9000 remapped: often taken on macOS)
    environment:
      # the official image restricts the `default` user to loopback-only
      # access unless these are set, which would otherwise block the
      # `loader` container's cross-container HTTP connections.
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env, see .env.example}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./data/lake:/var/lib/clickhouse/user_files/lake
      - ./sql/ddl_clickhouse.sql:/docker-entrypoint-initdb.d/01_ddl_clickhouse.sql:ro

  loader:
    build: ./docker/loader
    container_name: imdb-loader
    networks: [imdb-net]
    depends_on: [clickhouse]
    volumes:
      - ./scripts:/opt/scripts
      - ./sql:/opt/sql
      - ./data:/opt/data
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env, see .env.example}
      - LAKE_PATH=/opt/data/lake
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: ["sleep", "infinity"]

networks:
  imdb-net:
    driver: bridge

volumes:
  clickhouse-data:
