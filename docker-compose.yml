x-spark-common: &spark-common
  build: ./docker/spark
  image: imdb-spark:4.0.3-python3
  networks: [imdb-net]
  volumes:
    - ./scripts:/opt/scripts
    - ./data:/opt/data

services:
  spark-master:
    <<: *spark-common
    container_name: imdb-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8080:8080"   # Spark master web UI
      - "7077:7077"   # Spark master RPC

  spark-worker:
    <<: *spark-common
    container_name: imdb-spark-worker
    depends_on: [spark-master]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    ports:
      - "8081:8081"   # Spark worker web UI

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: imdb-clickhouse
    networks: [imdb-net]
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP interface
      - "9001:9000"   # native TCP interface (9000 remapped: often taken on macOS)
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env, see .env.example}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./data/lake:/var/lib/clickhouse/user_files/lake
      - ./sql/ddl_clickhouse.sql:/docker-entrypoint-initdb.d/01_ddl_clickhouse.sql:ro

  loader:
    build: ./docker/loader
    container_name: imdb-loader
    networks: [imdb-net]
    depends_on: [clickhouse]
    volumes:
      - ./scripts:/opt/scripts
      - ./sql:/opt/sql
      - ./data:/opt/data
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env, see .env.example}
      - LAKE_PATH=/opt/data/lake
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: ["sleep", "infinity"]

networks:
  imdb-net:
    driver: bridge

volumes:
  clickhouse-data:
